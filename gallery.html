<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
<script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

<title>Gallery</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f5f7;
    margin: 0;
}

nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(8px);
    box-sizing: border-box;
}

.wrapper {
    display: flex;
    justify-content: center;
    padding-top: 90px;
}

.container {
    width: 900px;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

#gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

.card {
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-5px);
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.card h3 {
    margin: 10px;
}

.card p {
    margin: 0 10px 15px;
    font-size: 14px;
    color: #555;
}

footer {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: gray;
}
</style>
</head>

<body>

<nav>
    <span>10-Sapphire</span>
    <div>
        <a href="index.html">Classmates</a>
        <a href="attendance.html">Attendance</a>
        <a href="gallery.html">Gallery</a>
    </div>
</nav>

<div class="wrapper">
    <div class="container">
        <h1> Highlights of Our Journey</h1>
        <div id="gallery"></div>
    </div>
</div>

<footer>
    Erin Antes, Keisha May Dellejero | 10-Emerald
</footer>

<py-script src="gallery.py"></py-script>

</body>
</html>
