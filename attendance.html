<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
<script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

<title>Attendance Tracker</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f5f7;
    margin: 0;
}
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(8px);
    box-sizing: border-box;
}
.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding-top: 80px;
}
.container {
    display: flex;
    gap: 30px;
    background: white;
    padding: 30px;
    border-radius: 16px;
    width: 800px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.08);
}
.left-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

label {
    font-size: 13px;
    color: #555;
}

select, input {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #e5e5e5;
    background: #fafafa;
}
button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    margin-top: 5px;
}

button:first-of-type {
    background: #111;
    color: white;
}

button:last-of-type {
    background: #eaeaea;
}
.right-panel {
    flex: 1.5;
    background: #fafafa;
    border-radius: 12px;
    padding: 10px;
    border: 1px solid #eee;
}
#log {
    margin-top: 10px;
    font-size: 13px;
    color: #333;
}
footer {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: gray;
}
</style>
</head>

<body>

<div class="navbar">
    <h3>Attendance Tracker</h3>
</div>

<div class="wrapper">
    <div class="container">

        <div class="left-panel">
            <h2> Attendance</h2>

            <label>Select Day:</label>
            <select id="day">
                <option>Monday</option>
                <option>Tuesday</option>
                <option>Wednesday</option>
                <option>Thursday</option>
                <option>Friday</option>
            </select>

            <label>Number of Absences:</label>
            <input type="number" id="absence" min="0">

            <button py-click="add_data">Add Data</button>
            <button py-click="show_graph">Show Graph</button>

            <div id="log"></div>
        </div>
        <div class="right-panel">
            <div id="graph"></div>
        </div>

    </div>
</div>

<footer>
  Erin Gayle Antes, Keisha May Dellejero| 10-Emerald
</footer>

<py-script src="main.py"></py-script>

</body>
</html>
